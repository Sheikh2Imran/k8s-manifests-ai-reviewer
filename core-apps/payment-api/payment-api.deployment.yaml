apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-app
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
  template:
    spec:
      containers:
      - name: web
        image: ghcr.io/example/payment-api:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: payment-api-config
        - secretRef:
            name: payment-api-secrets
        volumeMounts:
        - name: payment-data
          mountPath: /var/lib/payment

      volumes:
      - name: payment-data
        persistentVolumeClaim:
          claimName: payment-api-pvc
