apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-app
  labels:
    app.kubernetes.io/instance: payment-api
    app.kubernetes.io/name: payment-api
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/instance: payment-api
      app.kubernetes.io/name: payment-api
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: payment-api
        app.kubernetes.io/name: payment-api
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: web
        image: ghcr.io/example/payment-api:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: payment-api-config
        - secretRef:
            name: payment-api-secrets
        env:
        - name: branch
          value: "main"
        securityContext:
          runAsNonRoot: true
          runAsUser: 10001
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        startupProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: payment-data
          mountPath: /var/lib/payment
      volumes:
      - name: payment-data
        persistentVolumeClaim:
          claimName: payment-api-pvc
